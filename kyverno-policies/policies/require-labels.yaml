#               app: "?*"
#               env: "?*"

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: check-labels
      match:
        resources:
          kinds:
            - Pod
          namespaces:
            - default
            - dev
            - staging
      exclude:
        resources:
          namespaces:
          - keda
          - kube-system
          - argocd
          - kyverno
          - keda
      validate:
        message: "Labels 'app' and 'env' are required."
        pattern:
          metadata:
            labels:
              app: "?*"
              env: "?*"