# Policy: Disallow Latest Tag
# Purpose: Prevents usage of 'latest' tag in container images
# Benefit: Ensures version control and stable deployments

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: enforce
  rules:
    - name: no-latest-tag
      match:
        resources:
          kinds:
            - Pod
      exclude:
        resources:
          namespaces:
          - keda
          - kube-system
          - argocd
          - kyverno
      validate:
        message: "Using 'latest' tag is not allowed"
        pattern:
          spec:
            containers:
              - image: "!*:latest"