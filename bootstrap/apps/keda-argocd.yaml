apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-redis-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/akshayraina999/argo-cd.git
    targetRevision: HEAD
    path: keda/keda-redis-argocd/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: kafka

  syncPolicy:
    automated:
      prune: true
      selfHeal: true