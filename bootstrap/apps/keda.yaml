apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akshayraina999/argo-cd.git
    targetRevision: main
    path: keda/base
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true