apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: kafka
  labels:
    app: redis
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        env: dev
    spec:
      containers:
        - name: redis
          image: redis:7.2
          ports:
            - containerPort: 6379