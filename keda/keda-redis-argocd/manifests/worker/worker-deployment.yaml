apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-worker
  namespace: kafka
  labels:
    app: redis-worker
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-worker
  template:
    metadata:
      labels:
        app: redis-worker
        env: dev
    spec:
      containers:
        - name: worker
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install redis && \
              python - <<EOF
              import time
              import redis

              r = redis.Redis(host="redis.kafka.svc.cluster.local", port=6379)

              while True:
                  job = r.lpop("jobs")
                  if job:
                      print("Processing:", job)
                      time.sleep(5)
                  else:
                      time.sleep(1)
              EOF